name: Prepare Release

on:
  workflow_run:
    workflows: [Publish to PyPI]
    types: [completed]
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Preparing release for v$VERSION"

      - name: Check if tag exists
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::warning::Tag $TAG already exists — skipping tag creation"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag $TAG does not exist yet — will create"
          fi

      - name: Create tag
        if: ${{ steps.tag.outputs.exists == 'false' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "$TAG" -m "chore(release): tag $TAG for PyPI publish and GitHub release"
          git push origin "$TAG"
          echo "::notice::Created and pushed tag $TAG"

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist/fsf

          echo "::group::Preparing package artifact"
          cp -r fsf dist/fsf/
          cp pyproject.toml dist/fsf/
          cp LICENSE dist/fsf/
          cp README.md dist/fsf/
          cp version dist/fsf/
          echo "::endgroup::"

          echo "::group::Creating archives"
          tar -czf "fsf.v$VERSION.tar.gz" -C dist/fsf .
          zip -rq "fsf.v$VERSION.zip" dist/fsf
          echo "::endgroup::"

          echo "::notice::Artifacts built for v$VERSION"

      - name: Generate checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sha256sum \
            "fsf.v$VERSION.tar.gz" \
            "fsf.v$VERSION.zip" \
            > SHA256SUMS.txt

          echo "::notice::Generated SHA256SUMS.txt"

      - name: Create or update draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          BODY=$(cat .github/release-template.md)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG exists — updating"
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes "$BODY" \
              --draft
          else
            echo "::notice::Creating draft release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$BODY" \
              --draft
          fi
          echo "::notice::Draft release $TAG is ready"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"

          gh release upload "$TAG" \
            "fsf.v$VERSION.tar.gz" \
            "fsf.v$VERSION.zip" \
            SHA256SUMS.txt \
            --clobber

          echo "::notice::Uploaded release assets for $TAG"