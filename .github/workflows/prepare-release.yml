name: Prepare Release

on:
  workflow_run:
    workflows: [Publish to PyPI]
    types: [completed]
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Preparing release for v$VERSION"

      - name: Check if tag exists
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::warning::Tag $TAG already exists — skipping tag creation"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag $TAG does not exist yet — will create"
          fi

      - name: Create tag
        if: ${{ steps.tag.outputs.exists == 'false' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "$TAG" -m "chore(release): tag $TAG for PyPI publish and GitHub release"
          git push origin "$TAG"
          echo "::notice::Created and pushed tag $TAG"

      - name: Create or update draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v$VERSION"
          BODY=$(cat .github/release-template.md)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG exists — updating"
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes "$BODY" \
              --draft
          else
            echo "::notice::Creating draft release $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$BODY" \
              --draft
          fi
          echo "::notice::Draft release $TAG is ready"